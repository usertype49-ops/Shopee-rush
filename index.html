<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSWEB AI 行動管理系統 (Supabase 版)</title>
    <style>
        /* 全域視覺設計 */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background-color: #f4f7f6; 
            margin: 0; 
            padding: 20px; 
            color: #2c3e50;
        }
        h2 { 
            color: #2c3e50; 
            border-left: 6px solid #3498db; 
            padding-left: 15px; 
            margin-top: 35px;
            margin-bottom: 20px;
            font-size: 1.6rem;
            display: flex;
            align-items: center;
        }
        
        /* 圖片上傳區塊設計 */
        .upload-section {
            background: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .upload-section h3 { margin: 0; color: #8e44ad; }
        .file-input-wrapper {
            display: flex; gap: 10px; align-items: center;
            flex-wrap: wrap;
        }
        input[type="file"] {
            border: 1px dashed #bdc3c7;
            padding: 10px;
            border-radius: 8px;
            flex: 1;
            min-width: 200px;
        }
        .upload-btn {
            background: #9b59b6; color: white; padding: 12px 20px; border: none; 
            border-radius: 8px; font-size: 1.05rem; cursor: pointer; font-weight: bold;
            transition: background 0.2s;
        }
        .upload-btn:hover { background: #8e44ad; }
        .upload-btn:disabled { background: #bdc3c7; cursor: not-allowed; }

        /* 優美快捷選單網格 */
        .menu-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 20px; 
            margin-bottom: 30px; 
        }
        .menu-item-wrapper {
            background: #ffffff;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .menu-item-wrapper:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .menu-btn { 
            color: white; 
            padding: 15px 10px; 
            text-decoration: none; 
            text-align: center; 
            border-radius: 8px; 
            font-weight: 600; 
            font-size: 1.1rem;
            display: block;
            margin-bottom: 15px;
            text-shadow: 0px 1px 2px rgba(0,0,0,0.2);
            transition: opacity 0.2s;
        }
        .menu-btn:active { opacity: 0.8; }
        .menu-btn.line { background: linear-gradient(135deg, #00c300, #009900); }
        .menu-btn.shortcut { background: linear-gradient(135deg, #f39c12, #e67e22); }
        
        /* 按鈕群組 */
        .action-group { display: flex; gap: 10px; }
        .action-btn { 
            flex: 1; border: none; padding: 8px; border-radius: 6px; 
            cursor: pointer; font-size: 0.95rem; font-weight: 600; color: white;
        }
        .edit-btn { background: #3498db; }
        .edit-btn:hover { background: #2980b9; }
        .delete-btn { background: #e74c3c; }
        .delete-btn:hover { background: #c0392b; }

        /* 👑 今日專屬排版 */
        .table-responsive {
            width: 100%; background: white; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06); margin-bottom: 30px; overflow: hidden;
        }
        .daily-table {
            width: 100%; border-collapse: collapse; text-align: center;
            font-size: 1.25rem; table-layout: auto;
        }
        .daily-table th, .daily-table td {
            padding: 20px 25px; border-bottom: 1px solid #ecf0f1; word-break: keep-all;
        }
        .daily-table th { background-color: #f8f9fa; color: #34495e; font-weight: 700; }
        .daily-table tr:last-child td { border-bottom: none; }
        .person-name { font-weight: bold; color: #2c3e50; white-space: nowrap; }
        
        /* 班別高亮標示 */
        .shift-morning { background-color: #e8f4f8; color: #2980b9; font-weight: 600; } 
        .shift-night { background-color: #fdf2e9; color: #d35400; font-weight: 600; }   
        .shift-off { background-color: #fdedec; color: #c0392b; font-weight: 600; }     
        .shift-none { color: #bdc3c7; font-weight: bold; }

        /* 懸浮按鈕 FAB */
        .fab {
            position: fixed; bottom: 35px; right: 35px; background: #3498db; color: white;
            width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 30px; cursor: pointer; 
            box-shadow: 0 6px 15px rgba(52, 152, 219, 0.4); border: none; z-index: 1000; 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .fab:hover { transform: scale(1.1); }
        .fab:active { transform: scale(0.95); }

        /* 表單面板 */
        .form-section { 
            display: none; background: white; padding: 25px; border-radius: 12px; 
            margin-bottom: 30px; box-shadow: 0 8px 25px rgba(0,0,0,0.08); 
        }
        .form-section h3 { margin-top: 0; color: #2c3e50; display: flex; justify-content: space-between; align-items: center;}
        .close-form { cursor: pointer; color: #95a5a6; font-size: 1.2rem; }
        .form-section input, .form-section select { 
            width: 100%; padding: 14px; margin: 10px 0 20px 0; border: 1px solid #dcdde1; 
            border-radius: 8px; font-size: 1.05rem; box-sizing: border-box; 
        }
        .form-section button { 
            background: #2ecc71; color: white; padding: 14px; border: none; 
            border-radius: 8px; font-size: 1.1rem; cursor: pointer; width: 100%; font-weight: bold; 
        }

        /* 狀態列 */
        #ocr-status { 
            background: #e1f5fe; color: #0277bd; padding: 15px; border-radius: 8px; 
            font-weight: 600; margin-bottom: 25px; border-left: 5px solid #03a9f4; 
            font-size: 1.05rem; display: flex; align-items: center; gap: 10px;
        }
    </style>
</head>
<body>

    <button class="fab" onclick="window.toggleForm()">➕</button>

    <div class="form-section" id="addForm">
        <h3>
            <span id="form-title">✨ 新增選單項目</span>
            <span class="close-form" onclick="window.toggleForm()">✖</span>
        </h3>
        <input type="hidden" id="menu_id" value="">
        <input type="text" id="title" placeholder="顯示名稱 (例: 家族 LINE 群、設定捷徑)">
        <input type="text" id="url" placeholder="網址連結 或 Android Intent 路徑">
        <small style="color: #7f8c8d; display:block; margin-top:-15px; margin-bottom:15px; font-size: 0.85rem;">
            💡 提示：LINE請貼網址；安卓捷徑例: intent://#Intent;package=com.android.settings;end;
        </small>
        <select id="type">
            <option value="line">LINE 群組聊天室捷徑</option>
            <option value="shortcut">安卓手機 APP 捷徑</option>
        </select>
        <button onclick="window.saveMenu()">💾 儲存資料</button>
    </div>

    <div class="upload-section">
        <h3>📸 上傳班表圖片 AI 辨識</h3>
        <p style="margin: 0 0 10px 0; color: #7f8c8d; font-size: 0.95rem;">上傳今日或最新班表照片，系統將透過 Gemini 自動解析林義為與潘俞蓁的排班資訊並存入雲端資料庫。</p>
        <div class="file-input-wrapper">
            <input type="file" id="schedule-file" accept="image/png, image/jpeg, image/webp" />
            <button class="upload-btn" id="upload-btn" onclick="window.processImageAI()">上傳並解析</button>
        </div>
    </div>

    <h2 id="schedule-title">📅 今日班表自動同步</h2>
    <div id="ocr-status">✔️ 系統為最新狀態。如需更新請點擊上方按鈕上傳照片。</div>
    <div id="schedule-container"></div>

    <h2>🚀 快捷控制選單</h2>
    <div class="menu-grid" id="menu-container"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        // ==========================================
        // 🔑 您的 API 金鑰設定
        // ==========================================
        const GEMINI_API_KEY = 'AQ.Ab8RN6I4xQF8ZzYqBMrjLFY0qdPaDeW9oBuWmu7klnbzCnKEXA';
        const SUPABASE_URL = 'https://cnkxsxhgdtuxknrzufhv.supabase.co'; // 請填寫 Supabase Project URL
        const SUPABASE_KEY = 'sb_publishable_QEoX_f9G_Gf9kaaDZpaH-g_ageY5WFK'; // 請填寫 Supabase Anon Key
        
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // ==========================================
        // 介面與表單控制邏輯
        // ==========================================
        window.toggleForm = function(isEdit = false) {
            const form = document.getElementById('addForm');
            if(form.style.display === 'block' && !isEdit) {
                form.style.display = 'none';
            } else {
                form.style.display = 'block';
                if(!isEdit) {
                    document.getElementById('menu_id').value = '';
                    document.getElementById('title').value = '';
                    document.getElementById('url').value = '';
                    document.getElementById('form-title').innerText = "✨ 新增選單項目";
                }
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        // ==========================================
        // 選單 CRUD 操作 (Supabase)
        // ==========================================
        window.loadMenu = async function() {
            const container = document.getElementById('menu-container');
            const { data, error } = await supabase.from('menu_items').select('*').order('type', { ascending: true }).order('id', { ascending: false });
            
            if (error) {
                container.innerHTML = `<div style="color:red;">選單載入失敗: ${error.message}</div>`;
                return;
            }

            container.innerHTML = '';
            if(!data || data.length === 0) {
                container.innerHTML = '<div style="color:#7f8c8d;">目前無選單，請點擊右下角 ➕ 新增。</div>';
                return;
            }

            data.forEach(item => {
                const wrapper = document.createElement('div');
                wrapper.className = 'menu-item-wrapper';
                wrapper.innerHTML = `
                    <a href="${item.url}" class="menu-btn ${item.type}" target="_blank">
                        ${item.type === 'line' ? '💬' : '📱'} ${item.title}
                    </a>
                    <div class="action-group">
                        <button class="action-btn edit-btn" onclick="window.editMenu(${item.id}, '${item.title}', '${item.url}', '${item.type}')">修改</button>
                        <button class="action-btn delete-btn" onclick="window.deleteMenu(${item.id})">刪除</button>
                    </div>
                `;
                container.appendChild(wrapper);
            });
        };

        window.editMenu = function(id, title, url, type) {
            document.getElementById('menu_id').value = id;
            document.getElementById('title').value = title;
            document.getElementById('url').value = url;
            document.getElementById('type').value = type;
            document.getElementById('form-title').innerText = "✏️ 修改選單項目";
            window.toggleForm(true);
        };

        window.saveMenu = async function() {
            const id = document.getElementById('menu_id').value;
            const title = document.getElementById('title').value.trim();
            const url = document.getElementById('url').value.trim();
            const type = document.getElementById('type').value;

            if(!title || !url) return alert('請填寫完整名稱與路徑！');

            const record = { title, url, type };
            let result;

            if(id) {
                result = await supabase.from('menu_items').update(record).eq('id', id);
            } else {
                result = await supabase.from('menu_items').insert([record]);
            }
            
            if(result.error) alert('儲存失敗：' + result.error.message);
            
            window.toggleForm();
            window.loadMenu();
        };

        window.deleteMenu = async function(id) {
            if(!confirm('確定要刪除嗎？')) return;
            const { error } = await supabase.from('menu_items').delete().eq('id', id);
            if(error) alert('刪除失敗：' + error.message);
            window.loadMenu();
        };

        // ==========================================
        // 班表讀取邏輯 (Supabase)
        // ==========================================
        window.loadSchedule = async function() {
            const container = document.getElementById('schedule-container');
            const titleEl = document.getElementById('schedule-title');
            
            const d = new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            const todayStr = `${year}-${month}-${day}`;
            
            titleEl.innerHTML = `📅 今日班表 (${todayStr})`;

            const { data, error } = await supabase
                .from('shift_schedule')
                .select('*')
                .in('person_name', ['林義為', '潘俞蓁'])
                .eq('shift_date', todayStr);

            if (error) {
                container.innerHTML = `<div style="color:red; background:white; padding:15px; border-radius:12px;">今日班表載入失敗：${error.message}</div>`;
                return;
            }

            if (!data || data.length === 0) {
                container.innerHTML = `<div style="color:#7f8c8d; background:white; padding:20px; border-radius:12px; text-align:center; font-size:1.1rem;">今日 (${todayStr}) 尚無班表資料，或尚未排班。</div>`;
                return;
            }

            const people = ['林義為', '潘俞蓁'];
            const scheduleMap = { '林義為': '-', '潘俞蓁': '-' };
            
            data.forEach(item => {
                if (scheduleMap[item.person_name] !== undefined) {
                    scheduleMap[item.person_name] = item.shift_detail;
                }
            });

            let tableHtml = '<div class="table-responsive"><table class="daily-table">';
            tableHtml += '<thead><tr><th>門市人員</th><th>班表地點與時間</th></tr></thead><tbody>';

            people.forEach(person => {
                const detail = scheduleMap[person];
                let shiftClass = 'shift-none';
                let displayText = detail;
                
                if (detail !== '-') {
                    if (detail.includes('早')) shiftClass = 'shift-morning';
                    else if (detail.includes('晚')) shiftClass = 'shift-night';
                    else if (detail.includes('休') || detail.includes('公')) shiftClass = 'shift-off';
                }
                
                tableHtml += `<tr>
                    <td class="person-name">${person}</td>
                    <td class="shift-detail ${shiftClass}">${displayText}</td>
                </tr>`;
            });

            tableHtml += '</tbody></table></div>';
            container.innerHTML = tableHtml;
        };

                // ==========================================
        // Gemini AI 解析與圖片上傳邏輯 (修復防卡死版本)
        // ==========================================
        window.processImageAI = async function() {
            const fileInput = document.getElementById('schedule-file');
            const statusDiv = document.getElementById('ocr-status');
            const uploadBtn = document.getElementById('upload-btn');
            const file = fileInput.files[0];

            if (!file) {
                alert("請先選擇一張班表圖片。");
                return;
            }

            uploadBtn.disabled = true;
            statusDiv.style.background = "#fff3cd";
            statusDiv.style.color = "#856404";
            statusDiv.style.borderLeftColor = "#ffc107";
            statusDiv.innerText = "⏳ 正在處理圖片並呼叫 Gemini AI 解析，請稍候...";

            try {
                // 【修正點 1】將圖片讀取封裝成 Promise，確保系統能正確等待並捕捉錯誤
                const base64Data = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.onerror = () => reject(new Error("本機圖片檔案讀取失敗"));
                });

                const mimeType = file.type;
                const currentYear = new Date().getFullYear();

                const promptText = `這是一張排班表圖片。請精準找出「林義為」與「潘俞蓁」兩人的排班資訊。
請直接回傳純 JSON 陣列，不要包含 Markdown 標記或其他文字。
格式：[{"date": "YYYY-MM-DD", "name": "員工姓名", "shift": "班表內容"}]
規則：
1. 日期請結合表頭的月日，並預設年份為 ${currentYear}，格式必須為 YYYY-MM-DD。
2. 若班表為「休」、「指休」、「公」或空白，請將 shift 統一設為「休假」。
3. 若有排班，請完整擷取地點與時間，例如「愛國/四維 1900-2200」或「中洲/光華 0800~1100」。
4. 只需回傳林義為與潘俞蓁的資料，無資料則回傳 []。`;

                const payload = {
                    contents: [{
                        parts: [
                            { text: promptText },
                            { inline_data: { mime_type: mimeType, data: base64Data } }
                        ]
                    }]
                };

                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const resData = await response.json();
                
                if (resData.error) {
                    throw new Error(`AI 拒絕請求: ${resData.error.message}`);
                }

                let textResponse = resData.candidates[0]?.content?.parts[0]?.text || '[]';
                textResponse = textResponse.trim().replace(/```json/g, '').replace(/```/g, '');
                
                // 【修正點 2】嚴格檢查 JSON 格式，避免 AI 亂回話導致程式崩潰
                let scheduleData;
                try {
                    scheduleData = JSON.parse(textResponse);
                } catch (e) {
                    throw new Error("AI 回傳的資料無法辨識：" + textResponse.substring(0, 50) + "...");
                }

                if (!Array.isArray(scheduleData)) {
                    throw new Error("AI 回傳格式異常 (非陣列)");
                }

                const recordsToUpsert = [];
                scheduleData.forEach(row => {
                    if (row.date && row.name && row.shift) {
                        let detail = row.shift;
                        if (detail !== '休假') {
                            if (/(05|06|07|08|09|10|11|12)\d{2}/.test(detail)) {
                                detail = '早班 ' + detail;
                            } else if (/(16|17|18|19|20|21|22|23|00)\d{2}/.test(detail)) {
                                detail = '晚班 ' + detail;
                            } else {
                                detail = '有班 ' + detail;
                            }
                        }
                        recordsToUpsert.push({
                            shift_date: row.date,
                            person_name: row.name,
                            shift_detail: detail
                        });
                    }
                });

                // 寫入 Supabase 資料庫
                if (recordsToUpsert.length > 0) {
                    const { error: upsertError } = await supabase
                        .from('shift_schedule')
                        .upsert(recordsToUpsert, { onConflict: 'shift_date,person_name' });
                    
                    if(upsertError) throw new Error("寫入 Supabase 失敗: " + upsertError.message);
                    
                    statusDiv.style.background = "#d4edda";
                    statusDiv.style.color = "#155724";
                    statusDiv.style.borderLeftColor = "#28a745";
                    statusDiv.innerText = `✅ 成功！已為您同步 ${recordsToUpsert.length} 筆資料至雲端！`;
                } else {
                    statusDiv.style.background = "#e1f5fe";
                    statusDiv.style.color = "#0277bd";
                    statusDiv.style.borderLeftColor = "#03a9f4";
                    statusDiv.innerText = "✔️ AI 辨識完畢，但這張圖片中沒有找到林義為或潘俞蓁的班表資料。";
                }

                fileInput.value = ""; // 清空上傳欄位
                window.loadSchedule(); // 更新下方表格

            } catch (error) {
                // 【修正點 3】如果發生任何錯誤，把錯誤印在畫面上而不是卡住
                statusDiv.style.background = "#f8d7da";
                statusDiv.style.color = "#721c24";
                statusDiv.style.borderLeftColor = "#dc3545";
                statusDiv.innerText = `❌ 錯誤：${error.message}`;
                console.error(error);
            } finally {
                // 無論成功或失敗，都把按鈕恢復可點擊狀態
                uploadBtn.disabled = false;
            }
        };


        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            window.loadMenu();
            window.loadSchedule();
        });
    </script>
</body>
</html>
